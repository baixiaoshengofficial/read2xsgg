services:
  read2xsgg:
    image: knighttools/read2xsgg:${IMAGE_TAG:-latest}
    container_name: read2xsgg
    restart: unless-stopped
    init: true
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - path: .env
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATA_DIR: /data
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      FETCH_TIMEOUT_MS: ${FETCH_TIMEOUT_MS:-15000}
      MAX_SOURCE_BYTES: ${MAX_SOURCE_BYTES:-33554432}
      MAX_IMAGE_BYTES: ${MAX_IMAGE_BYTES:-26214400}
      MAX_MEDIA_BYTES: ${MAX_MEDIA_BYTES:-83886080}
      MAX_REDIRECTS: ${MAX_REDIRECTS:-5}
      MAX_CONCURRENT: ${MAX_CONCURRENT:-8}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-300}
      MAX_CACHE_ENTRIES: ${MAX_CACHE_ENTRIES:-100}
      ALLOW_PRIVATE_NETWORKS: ${ALLOW_PRIVATE_NETWORKS:-false}
      ALLOW_DNS_PROXY_NETWORKS: ${ALLOW_DNS_PROXY_NETWORKS:-true}
      PREFLIGHT_SOURCES: ${PREFLIGHT_SOURCES:-true}
      PREFLIGHT_DEEP_SOURCES: ${PREFLIGHT_DEEP_SOURCES:-false}
      PREFLIGHT_TIMEOUT_MS: ${PREFLIGHT_TIMEOUT_MS:-3000}
      PREFLIGHT_CONCURRENCY: ${PREFLIGHT_CONCURRENCY:-8}
      VERIFY_CONVERTED_SOURCES: ${VERIFY_CONVERTED_SOURCES:-true}
      ANALYZE_FALLBACK: ${ANALYZE_FALLBACK:-true}
      ANALYZE_TIMEOUT_MS: ${ANALYZE_TIMEOUT_MS:-8000}
      VERIFY_BUDGET_MS: ${VERIFY_BUDGET_MS:-20000}
      VERIFY_MAX_SOURCES: ${VERIFY_MAX_SOURCES:-50}
      JOB_CONCURRENCY: ${JOB_CONCURRENCY:-1}
      JOB_VERIFY_BUDGET_MS: ${JOB_VERIFY_BUDGET_MS:-0}
      MAX_COMIC_PAGES: ${MAX_COMIC_PAGES:-50}
      MAX_COMIC_IMAGES: ${MAX_COMIC_IMAGES:-2000}
      COMIC_PAGE_CONCURRENCY: ${COMIC_PAGE_CONCURRENCY:-4}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - ./data:/data
    read_only: true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid,nodev
    cap_drop:
      - ALL
    # Needed only by the root entrypoint to repair ownership of ./data, before
    # it drops privileges and starts the Node process as the `node` user.
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
